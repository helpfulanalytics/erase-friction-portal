name: Daily message digest

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call digest endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Missing secrets.APP_URL" && exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing secrets.CRON_SECRET" && exit 1
          fi

          curl -sS -X POST "$APP_URL/api/cron/message-digest" \
            -H "authorization: Bearer $CRON_SECRET" \
            -H "content-type: application/json" \
            --data "{}"

